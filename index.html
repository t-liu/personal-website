<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thomas S. Liu</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fredoka:wght@700&family=Roboto:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved || (prefersDark ? 'dark' : 'light');

      // Apply before first paint
      document.documentElement.setAttribute('data-theme', theme);

      // Block the CSS transition on html so the initial set is instant,
      // not animated. ThemeToggle.vue re-enables it on first toggle.
      document.documentElement.classList.add('no-theme-transition');
    })();
  </script>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
