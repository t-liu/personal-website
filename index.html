<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thomas S. Liu</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto:wght@500;700&family=Fredoka:wght@700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto:wght@500;700&family=Fredoka:wght@700&display=swap">
  
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved || (prefersDark ? 'dark' : 'light');

      // Apply before first paint
      document.documentElement.setAttribute('data-theme', theme);

      // Block the CSS transition on html so the initial set is instant,
      // not animated. ThemeToggle.vue re-enables it on first toggle.
      document.documentElement.classList.add('no-theme-transition');
    })();
  </script>
</head>

<body>
  <!-- Skip Link for accessibility -->
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
